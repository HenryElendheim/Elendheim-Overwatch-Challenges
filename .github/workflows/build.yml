name: build

on:
  push:
    branches: [testing, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, like v1.0. Leave empty to just build."
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.version || github.ref_name }}
      HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        if: env.HAS_KEYSTORE == 'true'
        run: printf '%s' "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build APKs
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            export RELEASE_KEYSTORE="$RUNNER_TEMP/release.jks"
          fi
          set -o pipefail
          ./gradlew assembleDebug assembleRelease 2>&1 | tee build-log.txt
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # temporary: the actions log api is flaky right now, so park compile
      # errors on the branch where they can be fetched over git
      - name: Push error log on failure
        if: failure() && github.ref == 'refs/heads/testing'
        run: |
          grep -E "^e: |error:|FAILURE" build-log.txt > ci-errors.txt || cp build-log.txt ci-errors.txt
          git config user.name "Henry Elendheim"
          git config user.email "henskielendheim@gmail.com"
          git add -f ci-errors.txt
          git commit -m "ci: park the build errors for a look"
          git push origin HEAD:testing || true

      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/v') || inputs.version != ''
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            cp app/build/outputs/apk/release/app-release.apk "ElendheimOverwatchChallenges-${RELEASE_TAG}.apk"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "ElendheimOverwatchChallenges-${RELEASE_TAG}.apk"
          fi

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          name: "Elendheim Overwatch Challenges ${{ env.RELEASE_TAG }}"
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: ElendheimOverwatchChallenges-*.apk
          body: |
            Elendheim Overwatch Challenges is a challenge roller for Overwatch. It rolls you a hero and a constraint to play under, lets you mutate or escalate the roll, and syncs rolls across your group with a shared squad word.
